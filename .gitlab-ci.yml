workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: always

stages:
  - build
  - publish
  - maintenance

.variables: &variables
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == "main"'
      variables:
        DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
        DOCKER_NO_CACHE: "--no-cache"
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        DOCKER_IMAGE: $CI_REGISTRY_IMAGE:latest
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
      variables:
        DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - if: '$CI_PIPELINE_SOURCE == "push"'
      variables:
        DOCKER_IMAGE: $CI_REGISTRY_IMAGE/review:$CI_COMMIT_REF_SLUG

build_image:
  stage: build
  interruptible: true
  <<: *variables
  image: docker:29-cli
  services:
    - docker:29-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY --username $CI_REGISTRY_USER --password-stdin
    - echo "Building image to" $DOCKER_IMAGE
    - docker buildx create --use --driver docker-container
  script: |
    docker buildx build \
      --platform linux/amd64,linux/arm64 \
      --tag $DOCKER_IMAGE \
      --cache-from type=registry,ref=$CI_REGISTRY_IMAGE/cache:buildcache \
      --cache-to type=registry,ref=$CI_REGISTRY_IMAGE/cache:buildcache,mode=max \
      --pull \
      --provenance=false \
      --push \
      --file docker/Dockerfile \
      ${DOCKER_NO_CACHE} \
      .
  after_script:
    - docker logout $CI_REGISTRY

verify_image:
  stage: build
  interruptible: true
  needs:
    - job: build_image
  <<: *variables
  image: $DOCKER_IMAGE
  script:
    - echo "Using Docker image" $DOCKER_IMAGE
    - pg_dump --version
    - tar --version
    - gsutil version

publish_to_github:
  stage: publish
  interruptible: true
  needs: []
  allow_failure: true
  rules:
    - if: ($CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "trigger")
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        TARGET: HEAD:main
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
      variables:
        TARGET: refs/tags/$CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH
      when: manual
      variables:
        TARGET: HEAD:$CI_COMMIT_BRANCH
  before_script:
    - apt-get update -y && apt-get install openssh-client git curl -y
    - eval $(ssh-agent -s)
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
    - git config --global user.email "hello@askanna.io"
    - git config --global user.name "AskAnna Robot"
    - git remote remove github || true
    - git remote add github git@github.com:askanna-io/backup-helper.git
  script:
    - echo "$SSH_PRIVATE_KEY_GITHUB_COM" | tr -d '\r' | ssh-add - > /dev/null
    - git fetch origin
    - git checkout -B ${CI_COMMIT_BRANCH:-${CI_COMMIT_TAG}}
    - git push github $TARGET
  after_script:
    - rm -f ~/.ssh/known_hosts
    - git remote remove github
    - eval $(ssh-agent -s)
    - ssh-add -D

create_release:
  stage: publish
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build_image
    - job: verify_image
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: $CI_COMMIT_TAG_MESSAGE
    assets:
      links:
        - name: "Docker image: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
          url: "https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}/container_registry"
          link_type: image

renovate:
  stage: maintenance
  needs: []
  image: renovate/renovate:latest
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: ${CI_API_V4_URL}
    RENOVATE_TOKEN: ${RENOVATE_TOKEN}
    RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@askanna.io>"
  script:
    - renovate $CI_PROJECT_PATH
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
